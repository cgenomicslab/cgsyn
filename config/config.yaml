# Species and data paths
# species: []  # Set via --species flag or uncomment and edit

## Resources paths
gff_dir: "resources/gff"
proteome_dir: "resources/proteomes"

## Intermediates paths
filtered_proteome_dir: "intermediates/filtered_proteomes"
tsv_dir: "intermediates/tsv"

## Results path
results_dir: "results"

# Analysis modes (set to true/false)
run_parsing: false
run_orthofinder: false
run_rbh: false
run_compare_methods: false
run_dotplots_orthofinder: false
run_dotplots_rbh: false
run_ribbons_orthofinder: false
run_ribbons_rbh: false
run_alg_discovery_orthofinder: false
run_alg_discovery_rbh: false
run_ribbons_multi_orthofinder: false
run_ribbons_multi_rbh: false
shared_ogs: false
cb_colors: false  # if true, use colorblind-safe palette for all plots
run_gene_analysis: false

# Orthofinder/RBH settings
orthofinder:
  aligner: "diamond"         # Options: diamond, diamond_ultra_sens, blastp, mmseqs, blastn
  threads: 12
  inflation: 1.2             # MCL inflation - higher = more smaller clusters
  tree_method: "msa"         # Options: msa, dendroblast
  msa_program: "famsa"       # Options: famsa, muscle, mafft (only used if tree_method=msa)
  tree_inference: "fasttree" # Options: fasttree, fasttree_fastest, raxml, iqtree3 (only used if tree_method=msa)

rbh:
  aligner: "diamond"
  threads: 12

# Fisher's test parameters
fishers:
  alpha: 0.01
  min_matches: false

# Plotting parameters
dotplot:
  dot_size: 2
  dot_alpha: 0.6
  figsize: [15, 15]
  color_nonsignificant: false

alg:
  similarity_threshold: 0.3
  min_orthologs: 2
  cluster_species: true   # if false, all species are treated as one group

ribbon:
  ribbon_alpha: 0.3
  figsize: [20, 12]
  curve_style: "bezier"

ribbons_multi:
  ribbon_alpha: 0.3
  figsize: [25, 15]
  curve_style: "bezier"

# Gene analysis (only used if run_gene_analysis: true)
gene_analysis:
  triangle_species: []
  rest_species: []
  mbh: false  # false = triangle mode, true = full MBH
